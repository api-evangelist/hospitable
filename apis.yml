aid: hospitable
url: https://raw.githubusercontent.com/api-evangelist/hospitable/refs/heads/main/apis.yml
name: Hospitable
kind: company
description: Hospitable (formerly Smartbnb) is a short-term and vacation rental
  automation platform for Airbnb, Vrbo, Booking.com, and direct-booking hosts and
  property managers. It centralizes multi-channel calendar syncing, AI-powered guest
  messaging in a unified inbox, cleaning and operations tasks, reviews, and a direct
  booking website. The Hospitable Public API v2 is a REST API at
  https://public.api.hospitable.com/v2 that lets hosts and vendors programmatically
  manage properties, channel listings, reservations, guest messaging, calendar
  availability and pricing, and reviews, authenticated with OAuth 2.0 (for vendors)
  or Personal Access Tokens (for personal use). v2 webhooks push reservation,
  property, message, and review events to a host's server.
