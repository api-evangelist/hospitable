    (reservation.created, reservation.changed, property.created/changed/deleted/merged,
    message.created, review.created) as JSON POST requests to a host-configured
    endpoint. Webhooks are configured in the dashboard (Apps > Webhooks); delivery is
    retried up to five times with exponential back-off.
