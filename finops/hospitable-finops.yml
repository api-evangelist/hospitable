meters:
- name: connected_properties
  description: Number of connected rental properties on the account - the primary per-unit subscription driver.
  unit: properties
  aggregation: max
  dimensions:
  - account
  - plan
- name: plan_tier
  description: Subscription tier (Free, Essentials, Professional, Mogul) that gates features including Public API and MCP access.
  unit: tier
  aggregation: last
  dimensions:
  - account
- name: smart_devices
  description: Smart-lock / device automations billed per device on some tiers.
  unit: devices
  aggregation: sum
  dimensions:
  - account
  - property
- name: processing_fees
  description: Percentage processing fees on custom upsells and security deposits.
  unit: percent
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track the number of connected properties and the current plan tier, since both determine the monthly subscription cost.
- name: Allocation
  description: Map property count and plan cost to owners, teams, or managed portfolios so each property's software cost is attributable.
- name: Optimization
  description: Right-size the plan tier to the features actually used (only go to Professional+ when Public API / MCP or its features are needed) and deactivate properties that are no longer managed to avoid per-property fees.
- name: Accountability
  description: Review connected-property count and add-on fees (smart devices, upsell and deposit processing) each billing cycle against expected portfolio size.
