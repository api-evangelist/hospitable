description: >-
  FinOps view of Hospitable spend. Hospitable bills as a monthly SaaS
  subscription priced primarily per property, not as a metered API. The dominant
  cost driver is the number of connected properties on the account - paid tiers
  include a base number of properties and charge a flat monthly fee per
  additional property. Plan tier (Essentials, Professional, Mogul) gates
  functionality, and Public API plus MCP access require Professional or higher.
  The Public API itself carries no separate per-call charge, so API usage does
  not create marginal cost; cost is managed by choosing the right plan tier and
  controlling the property count. Additional line items can include per-device
  smart-lock automation and percentage processing fees on upsells and deposits.
notes: >-
  Per-property and per-tier list prices are not reconciled here; confirm on the
  Hospitable pricing page. Because billing is per property and per plan rather
  than per API call, cost optimization is about right-sizing the plan and the
  active property count, not about API request volume. Formerly Smartbnb.
